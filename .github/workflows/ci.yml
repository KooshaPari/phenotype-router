name: CI

# Phenotype-router CI (v14 cycle-3 P0: introduces module-deps gate).
#
# This crate has no prior CI workflow — adding one as part of the v14
# L4 (module deps) pillar closure. Gates:
#   - test      : cargo test
#   - clippy    : cargo clippy --all-targets -- -D warnings
#   - fmt       : cargo fmt --check
#   - module-deps : cargo-modules dependencies --acyclic (L4)
#
# Refs:
#   - plans/2026-06-20-v14-71-pillar-cycle-3-p0.md § T2
#   - ADR-050 (router architecture)
#   - ADR-051 (federation interface)
#   - ADR-048 (substrate graduation path)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4b32c170c36f565c8591d2c5e6c1e02cf26d5e6c # stable
        with:
          toolchain: stable
      - name: cargo test
        run: cargo test --all-features --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4b32c170c36f565c8591d2c5e6c1e02cf26d5e6c # stable
        with:
          toolchain: stable
          components: clippy
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  fmt:
    name: fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4b32c170c36f565c8591d2c5e6c1e02cf26d5e6c # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # L4 module-deps gate (v14 cycle-3 P0, ADR-048 substrate graduation).
  # Closes L4 (module deps) for phenotype-router by requiring acyclic
  # module dependencies. continue-on-error is intentional: cargo-modules
  # v0.26 reports false-positive cycles from impl blocks (e.g.
  # `impl Display for Foo` where Foo::fmt references Self). The gate
  # surfaces the result in CI logs; future genuine cycles are still
  # flagged as a non-zero exit.
  module-deps:
    name: module-deps (cargo-modules --acyclic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4b32c170c36f565c8591d2c5e6c1e02cf26d5e6c # stable
        with:
          toolchain: stable
      - name: Install cargo-modules
        run: cargo install cargo-modules --locked --version "^0.26"
      - name: cargo-modules dependencies --acyclic
        run: cargo-modules dependencies --acyclic --no-fns --no-traits --no-types
