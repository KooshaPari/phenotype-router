name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tier-0 hygiene: cancel superseded runs on the same ref (saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e3f78fd1f6c2a43286e5ef3a13eea2e72ed23e1f # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@779680da715d629b86a86f9a2e2c439d7e8a065a # v2
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e3f78fd1f6c2a43286e5ef3a13eea2e72ed23e1f # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629b86a86f9a2e2c439d7e8a065a # v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e3f78fd1f6c2a43286e5ef3a13eea2e72ed23e1f # stable
      - uses: Swatinem/rust-cache@779680da715d629b86a86f9a2e2c439d7e8a065a # v2
      - run: cargo test --all-features --locked
      - run: cargo test --doc --locked

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e3f78fd1f6c2a43286e5ef3a13eea2e72ed23e1f # stable
      - uses: Swatinem/rust-cache@779680da715d629b86a86f9a2e2c439d7e8a065a # v2
      - run: cargo build --all-features --locked