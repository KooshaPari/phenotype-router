name: Dependency Policy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: dtolnay/rust-toolchain@e3f78fd1f6c2a43286e5ef3a13eea2e72ed23e1f # stable
      - uses: Swatinem/rust-cache@779680da715d629b86a86f9a2e2c439d7e8a065a # v2
      - uses: EmbarkStudios/cargo-deny-action@4ecc7c8b3e226df845bc2ed1d7d8b08d412f1045 # v2
        with:
          arguments: check

  cargo-audit:
    name: RustSec advisory database (rustsec/audit-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: rustsec/audit-check@2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  govulncheck-fwd-compat:
    name: govulncheck (forward-compat; skipped if no Go)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: |
          if [ ! -f go.mod ]; then
            echo "::notice::No go.mod — skipping govulncheck (forward-compat guard)."
            exit 0
          fi
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...