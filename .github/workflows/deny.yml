name: Dependency Policy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: check

  cargo-audit:
    name: RustSec advisory database (rustsec/audit-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  govulncheck-fwd-compat:
    name: govulncheck (forward-compat; skipped if no Go)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - run: |
          if [ ! -f go.mod ]; then
            echo "::notice::No go.mod — skipping govulncheck (forward-compat guard)."
            exit 0
          fi
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...