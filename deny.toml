# `deny.toml` — supply-chain + license policy for `phenotype-router`.
#
# Mirror the substrate-quality-bar policy from
# `pheno-port-adapter/deny.toml` and `pheno-otel/deny.toml`. The
# `phenotype-router` is a small dep footprint (thiserror, async-trait,
# tracing, tracing-subscriber, serde, plus dev-deps) so the deny
# rules are intentionally minimal.

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
